version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sifs-ie-postgres
    environment:
      POSTGRES_USER: sifs_user
      POSTGRES_PASSWORD: sifs_password
      POSTGRES_DB: sifs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sifs-ie-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
