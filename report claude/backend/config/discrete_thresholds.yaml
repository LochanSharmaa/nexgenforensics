# Discrete (forensic categorical) bucketing thresholds, per continuous
# feature_id. Boundaries are expressed as ratios relative to
# `normalize_by` (another continuous feature, typically interocular_distance
# or face_width) so they are somewhat scale-invariant across image
# resolutions.
#
# THESE DEFAULT BOUNDARIES ARE ILLUSTRATIVE / PLACEHOLDER VALUES.
# Per docs/build_prompt.md section 8, calibrate against a labeled reference
# population before any real forensic use — do not treat the out-of-the-box
# numbers as validated.

normalize_by: interocular_distance

features:
  face_width:
    categories: ["narrow", "average", "wide"]
    ratio_bounds: [2.6, 3.4]     # <2.6 narrow, 2.6-3.4 average, >3.4 wide

  face_height:
    categories: ["short", "average", "tall"]
    ratio_bounds: [3.0, 3.8]

  eye_width_r:
    categories: ["small", "average", "large"]
    ratio_bounds: [0.55, 0.75]

  eye_width_l:
    categories: ["small", "average", "large"]
    ratio_bounds: [0.55, 0.75]

  eyebrow_length_r:
    categories: ["short", "long"]
    ratio_bounds: [0.9]

  eyebrow_length_l:
    categories: ["short", "long"]
    ratio_bounds: [0.9]

  nose_width:
    categories: ["small", "average", "large"]
    ratio_bounds: [0.9, 1.2]

  nose_height:
    categories: ["short", "average", "large"]
    ratio_bounds: [1.3, 1.7]

  mouth_width:
    categories: ["small", "average", "large"]
    ratio_bounds: [1.4, 1.8]

  jaw_width:
    categories: ["narrow", "average", "wide"]
    ratio_bounds: [2.2, 2.8]

  chin_height:
    categories: ["short", "average", "tall"]
    ratio_bounds: [0.5, 0.8]

  forehead_height:
    categories: ["short", "average", "tall"]
    ratio_bounds: [1.1, 1.4]

  forehead_width:
    categories: ["narrow", "average", "wide"]
    ratio_bounds: [2.2, 2.6]

  ear_height_l:
    categories: ["small", "average", "large"]
    ratio_bounds: [0.6, 0.8]

  ear_height_r:
    categories: ["small", "average", "large"]
    ratio_bounds: [0.6, 0.8]

