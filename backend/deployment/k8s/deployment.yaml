apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexgen-identity-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexgen-identity-api
  template:
    metadata:
      labels:
        app: nexgen-identity-api
    spec:
      containers:
        - name: api
          image: nexgen-identity-api:0.1.0
          ports:
            - containerPort: 8443
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
