apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexgen-identity-api
spec:
  rules:
    - host: api.nexgen-identity.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexgen-identity-api
                port:
                  number: 8443
